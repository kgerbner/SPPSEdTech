# Policy Q&A index — the clause-level entries behind the homepage question bar.
#
# HOW TO EDIT: each entry needs:
#   citation — the precise clause/policy being quoted (shown to the visitor)
#   source   — who publishes it
#   kind     — "quote" (verbatim from the source) or "summary" (paraphrase)
#   text     — the clause text shown as the answer
#   url      — where the visitor can read the full source
#   topics   — lowercase keywords the search matches against (be generous)
# Quotes come from the policy-snapshots/ files fetched from official sites;
# when those pages change, the policy watcher opens a PR — re-check quotes then.

- id: mn-cell-phone-law
  citation: "Minn. Stat. § 121A.73 — School Cell Phone Policy"
  source: "Minnesota Statutes (2024)"
  kind: quote
  text: >
    "A school district or charter school must adopt a policy on students'
    possession and use of cell phones in school by March 15, 2025. The Minnesota
    Elementary School Principals' Association and the Minnesota Association of
    Secondary School Principals must collaborate to make best practices available
    to schools … to minimize the impact of cell phones on student behavior,
    mental health, and academic attainment."
  url: "https://www.revisor.mn.gov/statutes/cite/121A.73"
  topics: [state, law, statute, legislature, minnesota, cell, phone, policy, required, mandate, deadline, march, 2025, mental, health, behavior, academic]

- id: mn-pending-ban
  citation: "SF 508 / HF 2516 (2026 session — pending, not law)"
  source: "Minnesota Legislature"
  kind: summary
  text: >
    A pending proposal would go further than current law: a complete ban on cell
    phones and smartwatches for grades K–8 and a classroom ban for grades 9–12,
    statewide, starting in 2026–27. As of spring 2026 it was folded into a larger
    education bill and has not passed. If it becomes law, it would override
    SPPS's school-by-school discretion.
  url: "https://www.revisor.mn.gov/bills/bill.php?b=Senate&f=SF0508&ssn=0&y=2025"
  topics: [ban, statewide, bill, pending, smartwatch, watch, k-8, elementary, middle, high, classroom, 2026, sf508, override, law]

- id: spps-550
  citation: "SPPS Board Policy 550.00 — Cellular Phones and Personal Electronic Devices"
  source: "SPPS Board of Education"
  kind: summary
  text: >
    Adopted February 2025 and in effect since fall 2025: students' personal
    devices must be turned off and out of sight during the school day — left at
    home, in a locker, or off in a backpack — with exceptions for documented
    medical needs and emergencies. Each school publishes its own implementation
    procedures (lunch, passing time, storage, enforcement), which is why rules
    differ between buildings.
  url: "https://www.spps.org/about/board-of-education/board-policies-procedures"
  topics: [phone, cell, cellphone, smartphone, smartwatch, watch, earbuds, headphones, personal, device, bring, school, allowed, ban, locker, backpack, off, away, medical, exception, emergency, lunch, passing, 550]

- id: spps-school-procedures
  citation: "Policy 550.00 — school-level implementation"
  source: "SPPS Board of Education"
  kind: summary
  text: >
    The district policy delegates implementation details to each building: your
    school's principal and site council decide what happens at lunch and passing
    time, how devices are stored, and how the rule is enforced. Ask your school
    for its written procedures if you can't find them on its website.
  url: "https://www.spps.org/about/board-of-education/board-policies-procedures"
  topics: [school, principal, site, council, implementation, procedures, lunch, passing, enforcement, differs, building, my]

- id: spps-520
  citation: "SPPS Board Policy 520.00 — Technology Usage & Safety"
  source: "SPPS Board of Education"
  kind: summary
  text: >
    The district's acceptable-use policy for its own technology. Students sign an
    Acceptable Use Agreement, and a Technology Opt Out Form (procedure 520.00.1)
    exists for families. This policy — not the phone policy — is the one that
    governs the district-issued iPads.
  url: "https://www.spps.org/about/board-of-education/board-policies-procedures"
  topics: [acceptable, use, agreement, technology, usage, safety, opt, out, form, 520, internet, rules, ipad]

