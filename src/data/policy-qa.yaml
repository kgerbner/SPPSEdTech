- id: ipad-fines
  citation: "SPPS Technology Services — damaged or lost iPads"
  source: "spps.org (citing Minn. Stat. §§ 123B.34–123B.39)"
  kind: quote
  text: >
    "No fines can be required for student iPad breakage or loss due to MN state
    statutes (sections 123B.34 to 123B.39)." Schools "may request, not require,"
    payment for damaged or missing equipment; consequences can include losing
    take-home privileges.
  url: "https://www.spps.org/about/departments/technology-services/students-and-families"
  topics: [fine, fines, fee, pay, charge, broken, damaged, lost, stolen, cost, replace, money]

- id: ipad-filtering
  citation: "SPPS Technology Services — internet filtering"
  source: "spps.org"
  kind: quote
  text: >
