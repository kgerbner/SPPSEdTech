- id: data-privacy
  citation: "SPPS Technology Services — student data and outside companies"
  source: "spps.org"
  kind: quote
  text: >
    "External 'LMS' companies, including Seesaw, Schoology and others sign
    contracts and data sharing agreements with Saint Paul Public Schools. …
    Student data is NOT tracked by these companies after our students leave or
    move to the next system." Records practices are governed by Board Policy
    304.00 (Records: Data Management).
