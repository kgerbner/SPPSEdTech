- id: public-comment
  citation: "SPPS Board Policy 206.01 — Public Participation in Board Meetings"
  source: "SPPS Board of Education"
  kind: summary
  text: >
    Board policy provides for public participation at regular board meetings,
    with published guidelines for public comment (exhibit 206.01.01). Policy
    changes get multiple public readings before a vote, so there is always a
    window to weigh in before a decision is final.
  url: "https://www.spps.org/about/board-of-education"
  topics: [comment, public, speak, board, meeting, testify, voice, participate, weigh, input, hearing, 206]
