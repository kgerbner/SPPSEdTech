# Get Involved — opportunities for parents, teachers, and community members.
#
# HOW TO EDIT: grouped by "audience" (everyone, parents, teachers). Each item
# needs a title, a "how" paragraph, and optionally a url + linkLabel.

- audience: everyone
  heading: "For everyone"
  items:
    - title: "Attend a school board meeting"
      how: >
        The SPPS Board of Education meets regularly at 360 Colborne Street, and
        meetings are streamed and archived. Policy changes — like the 2025 device
        policy — get two public "readings" before a vote, which means there is
        always a window to weigh in before a decision is final. Check the board
        calendar for upcoming meeting dates.
      url: "https://www.spps.org/about/board-of-education"
      linkLabel: "SPPS Board of Education"
    - title: "Give public comment"
      how: >
        Each regular board meeting includes a public comment period. Sign-up
        details are on the board page; comments are typically limited to a few
        minutes, so prepare one clear point — for example, asking when the
        district last evaluated whether its 1:1 iPad program improves learning.
      url: "https://www.spps.org/about/board-of-education"
      linkLabel: "Public comment information"
    - title: "Email the board and superintendent"
      how: >
        Board members' contact information is public. A short, specific, personal
        message (what you've observed with your own student, one question you want
        answered) is more effective than a form letter.
      url: "https://www.spps.org/about/board-of-education"
      linkLabel: "Board member contacts"
    - title: "Contact your state legislators"
      how: >
        The 2024 cell phone law — and the statewide bell-to-bell ban now pending
        at the Legislature (SF 508 / HF 2516) — show that state law sets the floor
        local districts build on. Find your legislators and tell them where you
        stand; committee testimony from parents and teachers is taken seriously.
      url: "https://www.gis.lcc.mn.gov/iMaps/districts/"
      linkLabel: "Find your Minnesota legislators"
    - title: "Join an organization working on this"
      how: >
        Minnesota-based LiveMore ScreenLess works with schools statewide;
        Smartphone Free Childhood coordinates parent pacts by school; Away For The
        Day provides ready-made advocacy materials for phones-away policies. See
        the Learn More page for all of them.

- audience: parents
  heading: "For parents and guardians"
  items:
    - title: "Ask your school about its implementation procedures"
      how: >
        SPPS's device policy deliberately leaves implementation to each building.
        That means your principal and site council decide what happens at lunch,
        during passing time, and in classrooms. Ask for your school's written
        procedures — and if they're weaker than you'd like, the site council and
        PTO/PTA are where that conversation happens.
    - title: "Raise it through your school's parent group and SPPS advisory councils"
      how: >
        District advisory committees and parent advisory councils are standing
        channels into district decision-making, and they regularly have open
        seats. Technology use is squarely within their charge.
      url: "https://www.spps.org/families"
      linkLabel: "SPPS family engagement"
    - title: "Review what's on the district iPad"
      how: >
        Ask your student to walk you through a typical school day on the iPad:
        which apps are assigned, which are available, and how much of homework
        requires the screen. Specific observations ("my 3rd grader's math practice
        is a game with streaks and rewards") are the most persuasive evidence in
        any meeting.
    - title: "Coordinate with other families"
      how: >
        Much of the pressure for change in other districts came from a handful of
        families comparing notes and showing up together. A school-level pact —
        even five families — gets a meeting with a principal.

- audience: teachers
  heading: "For teachers and school staff"
  items:
    - title: "Document what you see"
      how: >
        Teachers' classroom observations about device distraction carry unique
        weight with the board and with reporters. Florida's and Minnesota's
        policies both moved when educators went on the record.
    - title: "Bring evidence to PLCs and staff meetings"
      how: >
        The research on the Learn More page — especially the OECD distraction
        findings and the UNESCO report — is written for exactly these
        conversations. Purposeful-use norms adopted by a grade-level team often
        spread building-wide.
    - title: "Work through your union and site council"
      how: >
        The Saint Paul Federation of Educators bargains and advocates on working
        conditions, and classroom technology policy is increasingly part of that
        conversation nationally. Site councils set the building-level procedures
        the district policy delegates.
      url: "https://www.spfe.org/"
      linkLabel: "Saint Paul Federation of Educators"
